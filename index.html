кстура, що дихає.\n\nВласне високотехнологічне виробництво дозволяє контролювати кожен стібок, гарантуючи довговічність і бездоганний вигляд кожного виробу."},"ru":{"title":"Искусство Деталей","subtitle":"01 / МАТЕРИАЛЫ И ПРОИЗВОДСТВО","body":"Мы тщательно отбираем ткани от ведущих мировых производителей:\n\n• Длинноволокнистый египетский хлопок — невероятная мягкость и шелковистый блеск.\n• Тенсель (эвкалиптовое волокно) — природная терморегуляция и гипоаллергенность.\n• Натуральный умягченный лен — аутентичная, дышащая текстура.\n\nСобственное высокотехнологичное производство позволяет контролировать каждый стежок, гарантируя долговечность и безупречный вид каждого изделия."},"en":{"title":"The Art of Details","subtitle":"01 / MATERIALS & PRODUCTION","body":"We meticulously source fabrics from the world's leading mills:\n\n• Long-staple Egyptian Cotton — incredible softness and silky luster.\n• Tencel (Eucalyptus Fiber) — natural temperature regulation and hypoallergenic properties.\n• Natural Washed Linen — authentic, breathable texture.\n\nOur in-house, high-tech manufacturing enables strict control over every single stitch, guaranteeing durability and an impeccable look for every product."}}},{"id":"slide-3","number":3,"layout":"split","image":"https://shtayer.ua/image/catalog/postelnoe-bele/flat%20grey/img19086-min.jpg","content":{"uk":{"title":"Ексклюзивні Колекції","subtitle":"02 / АСОРТИМЕНТ БРЕНДУ","body":"Shtayer пропонує комплексні рішення для оформлення інтер'єру:\n\n• Колекція Balmy — постільна білизна з королівського сатину з витонченим мереживом та вишивкою.\n• Лінійка Bamboo — халати та домашній одяг з бамбукового волокна, що дарують ніжність шкірі.\n• Ковдри та подушки — з наповнювачами з кашеміру, шовку та гусячого пуху преміум-класу для ідеального мікроклімату."},"ru":{"title":"Эксклюзивные Коллекции","subtitle":"02 / АССОРТИМЕНТ БРЕНДА","body":"Shtayer предлагает комплексные решения для оформления интерьера:\n\n• Коллекция Balmy — постельное бел
