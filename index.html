        indexIndicator.textContent = indText;

        // Update Navigation buttons state
        prevBtn.disabled = activeSlideIndex === 0;
        nextBtn.disabled = activeSlideIndex === slides.length - 1;

        // Add real-time input listeners to save text changes directly
        if (isEditMode) {
          attachEditListeners();

      function attachEditListeners() {
        var elTitle = document.getElementById("editable-title");
        var elSubtitle = document.getElementById("editable-subtitle");
        var elBody = document.getElementById("editable-body");

        if (elTitle) {
          elTitle.addEventListener("blur", function() {
            slides[activeSlideIndex].content[currentLang].title = elTitle.innerHTML;
          });
        }
        if (elSubtitle) {
          elSubtitle.addEventListener("blur", function() {
            slides[activeSlideIndex].content[currentLang].subtitle = elSubtitle.innerHTML;
          });
        }
        if (elBody) {
          elBody.addEventListener("blur", function() {
            slides[activeSlideIndex].content[currentLang].body = elBody.innerHTML;
          });
        }
      }

      // Slide image editor simulation
      window.handleImageClick = function(slideId) {
        if (!isEditMode) return;
        var newUrl = prompt("Введіть URL адресу нового фонового зображення для слайда:", slides[activeSlideIndex].image);
        if (newUrl) {
          slides[activeSlideIndex].image = newUrl;
          renderSlide();
        }
      };

      // Navigate slides
      function nextSlide() {
        if (activeSlideIndex < slides.length - 1) {
          activeSlideIndex++;
          renderSlide();
        }
      }

      function prevSlide() {
        if (activeSlideIndex > 0) {
          activeSlideIndex--;
          renderSlide();
        }
      }

      // Keyboard arrow navigation
      document.addEventListener("keydown", function(e) {
        if (isEditMode && document.activeElement.hasAttribute("contenteditable")) {
          return; // Ignore arrow key navigation if actively editing text
        }
        if (e.key === "ArrowRight") {
          nextSlide();
        } else if (e.key === "ArrowLeft") {
          prevSlide();
        }
      });

      // Nav Button click events
      nextBtn.addEventListener("click", nextSlide);
      prevBtn.addEventListener("click", prevSlide);

      // Handle Edit Mode toggle
      editModeToggle.addEventListener("change", function(e) {
        isEditMode = e.target.checked;
        if (isEditMode) {
          document.body.classList.add("edit-active");
          saveBtn.classList.remove("hidden");
        } else {
          document.body.classList.remove("edit-active");
          saveBtn.classList.add("hidden");
        }
        renderSlide();
      });

      // Save offline simulation
      saveBtn.addEventListener("click", function() {
        state.slides = slides;
        state.language = currentLang;
        stateEl.textContent = JSON.stringify(state);
        alert(currentLang === 'uk' ? "Зміни успішно збережено в тимчасовій пам'яті браузера!" : "Изменения успешно сохранены в кэше браузера!");
      });

      // Language switcher action
      langSelect.addEventListener("change", function(e) {
        currentLang = e.target.value;
        updateUiStrings();
        renderSlide();
      });

      // Set initial UI and slide content
      updateUiStrings();
      applyTheme();
      renderSlide();
    })();
