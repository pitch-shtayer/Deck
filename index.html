    /* Адаптивність слайдів із фіксованим співвідношенням 16:9 */

      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
    }

    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.99); }

    }

    // Очищення нікнеймів / телефонів для кнопок
    function getShortLabel(value, type) {
      if (!value) return "";
      var trimmed = value.trim();
      if (type === "instagram") {
        var username = trimmed.replace(/\/$/, "");
        if (username.indexOf("instagram.com/") !== -1) {
          username = username.split("instagram.com/")[1];
        }
        if (username.indexOf("?") !== -1) {
          username = username.split("?")[0];
        }
        return username.indexOf("@") === 0 ? username : "@" + username;
      }
      if (type === "telegram") {
        var username = trimmed.replace(/\/$/, "");
        if (username.indexOf("t.me/") !== -1) {
          username = username.split("t.me/")[1];
        }
        return username.indexOf("@") === 0 ? username : "@" + username;
      }
      if (type === "website") {
        var domain = trimmed.replace(/^(https?:\/\/)?(www\.)?/, "");
        domain = domain.split("/")[0];
        return domain;
      }
      if (type === "whatsapp") {
        return "WhatsApp";
      }
      return trimmed;
    }

        socialHtml += '<a href="' + webUrl + '" target="_blank" rel="noopener noreferrer" class="group flex items-center h-8 rounded-full bg-[#bd603f] hover:bg-[#a54c2d] text-white shadow-md hover:shadow-lg transition-all duration-300 ease-out overflow-hidden px-2.5 max-w-[34px] hover:max-w-[220px] w-8.5 hover:w-auto" title="Website">';
        socialHtml += '<svg class="w-4 h-4 text-white shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>';
        socialHtml += '<span class="text-[11px] font-bold text-white opacity-0 group-hover:opacity-100 transition-opacity duration-300 whitespace-nowrap overflow-hidden ml-0 group-hover:ml-2">' + getShortLabel(socialLinks.website, 'website') + '</span>';
        socialHtml += '</a>';
      }
      socialHtml += '</div>';
      
      slideHtml += socialHtml;
      stage.innerHTML = slideHtml;
      
      // Налаштування індикатора кількості слайдів
      const textLabels = uiLabels[currentLang] || uiLabels.en;
      let indText = textLabels.slideIndicator || "Слайд {current} з {total}";
      indText = indText.replace("{current}", activeSlideIndex + 1).replace("{total}", slides.length);
      indexIndicator.textContent = indText;

      // Стан кнопок
      prevBtn.disabled = activeSlideIndex === 0;
      nextBtn.disabled = activeSlideIndex === slides.length - 1;
    }

    // Навігаційні переходи
    function prevSlide() {
      if (activeSlideIndex > 0) {
        activeSlideIndex--;
        renderSlide();
      }
    }

    function nextSlide() {
      if (activeSlideIndex < slides.length - 1) {
        activeSlideIndex++;
        renderSlide();
      }
    }

    prevBtn.addEventListener('click', prevSlide);
    nextBtn.addEventListener('click', nextSlide);

    // Стрілочки клавіатури
    document.addEventListener('keydown', function(e) {
      if (document.activeElement && (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'SELECT')) {
        return;
      }
      if (e.key === 'ArrowLeft') {
        prevSlide();
      } else if (e.key === 'ArrowRight') {
        nextSlide();
      }
    });

    // Зміна мов
    langSelect.addEventListener('change', function(e) {
      currentLang = e.target.value;
      applyLabels();
      renderSlide();
    });

    // Старт
    applyGlobalTheme();
    renderLogo();
    applyLabels();
    renderSlide();
  </script>
</body>
</html>
