  <style>
    /* Premium Standalone offline fallback fonts and CSS variables */
    :root {
      --color-primary: #bd603f;

      --font-serif: 'Lora', Georgia, serif;
      --font-sans: 'Manrope', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Courier New', Courier, monospace;
      --font-display: 'Lora', serif;
      --font-accent: 'Alex Brush', cursive;
    }
    
    html, body {
      font-family: var(--font-sans);
      background-color: #1c1917;
      color: #f5f5f4;
      touch-action: pan-y;
      overflow: hidden;
      height: 100vh;
      height: 100dvh;
      width: 100vw;
      width: 100dvw;

    body {
      position: fixed;
      top: 0;
      left: 0;

    .font-serif {

    .font-mono {

    }

    .font-display {
      font-family: var(--font-display);
    }

    .font-accent {
      font-family: var(--font-accent);
    }

    /* Aspect ratio styling for 16:9 slides */
    .slide-wrapper {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
    }

    @media (max-width: 767px) {
      .slide-wrapper {
        height: 100%;
        width: 100%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        overflow-y: auto;
      }
    }

    /* Swipe animations and slide active transitions */
    .slide-enter-active {
      animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.99); }
      to { opacity: 1; transform: scale(1); }

    /* Scrollbar styling for lead/body text if it overflows */

дхід та майстерність","subtitle":"Якість, за яку ви з гордістю ручаєтесь перед клієнтом","body":"• Матеріали: Сертифікована довговолокниста єгипетська бавовна, натуральний шовк, льон та преміальні наповнювачі.\n• Виконання: Кожен шов, кант і вишивка проходять ручний контроль. Ми гарантуємо ідеальну геометрію виробів навіть після сотень прань.\n• Відчуття: Ваші клієнти відчують виняткову преміальність з першого ж дотику."},"ru":{"title":"Мануфактурный подход и мастерство","subtitle":"Качество, за которое вы с гордостью ручаетесь перед клиентом","body":"• Материалы: Сертифицированный длинноволокнистый египетский хлопок, натуральный шелк, лен и премиальные наполнители.\n• Исполнение: Каждый шов, кант и вышивка проходят ручной контроль. Мы гарантируем идеальную геометрию изделий даже после сотен стирок.\n• Ощущения: Ваши клиенты почувствуют исключительную премиальность с первого же прикосновения."},"en":{"title":"Atelier Craftsmanship & Detail","subtitle":"Quality You Proudly Guarantee to Your Client","body":"• Materials: Certified long-staple Egyptian cotton, natural mulberry silk, organic linen, and premium fillings.\n• Tailoring: Every seam, piping, and embroidery undergoes meticulous hand inspection. We guarantee perfect geometry even after hundreds of washes.\n• Experience: Your clients will feel the extraordinary quality from the very first touch."}}},{"id":"slide-5","number":5,"layout":"grid","image":"https://shtayer.ua/image/catalog/postelnoe-bele/flat%20grey/img19086-min.jpg","imageAlt":"Shtayer premium collection bed linens, luxury goose down pillows, cashmere duvets and wellness robes","content":{"uk":{"title":"Комплектація спальні та ванної кімнати 'під ключ'","subtitle":"Асортимент, що закриває будь-які текстильні потреби об'єкта","body":"1. Постільна білизна: Колекції з сатину, перкалю та шовку. Пошиття під нестандартні матраци.\n2. Ковдри та подушки: Індивідуальне 'меню подушок' різної пружності для ідеального клімат-контролю сну.\n3. Махрові вироби: Халати та рушники преміальної щільності з відчуттям 5-зіркового SPA вдома."},"ru":{"title":"Комплектация спальни и ванной 'под ключ'","subtitle":"Ассортимент, закрывающий любые текстильные потребности объекта","body":"1. Постельное белье: Коллекции из сатина, перкаля и шелка. Пошив под нестандартные матрасы.\n2. Одеяла и подушки: Индивидуальное 'меню подушек' разной упругости для идеального климат-контроля сна.\n3. Махровые изделия: Халаты и полотенца премиальной плотности с ощущением 5-звездного SPA дома."},"en":{"title":"Turnkey Bedroom & Bathroom Collection","subtitle":"A Curated Portfolio Covering All Textile Specifications","body":"1. Bed Linens: Refined sateen, percale, and silk collections. Custom tailoring for any non-standard size.\n2. Pillows & Duvets: An intuitive 'pillow menu' of varying firmness for ultimate sleep climate control.\n3. Spa Attire: Premium high-density robes and towels delivering a 5-star spa sensation in their private bath."}}},{"id":"slide-6","number":6,"layout":"split","image":"https://shtayer.ua/image/catalog/postelnoe-bele/pearl/1234.jpg","imageAlt":"Architect desk with floor plans, fabric color swatches, and a beautiful designer sample box","content":{"uk":{"title":"Професійні можливості для дизайнерів та архітекторів","subtitle":"Співпраця, що підкреслить статус ваших проєктів","body":"• Партнерські програми: Спеціальні умови закупівлі, персональна агентська винагорода або індивідуальні знижки для ваших клієнтів.\n• Професійні матеріали: Безкоштовно надсилаємо преміальний Sample Box зі зразками понад 40 видів тканин і надаємо безшовні 3D-текстури високої роздільної здатності.\n• Супровід «під ключ»: Персональний технолог візьме на себе всі закриття — від точних замірів ліжок до фінального прасування та застеляння на об'єкті.\n\nЗалиште ваш номер телефону, щоб безкоштовно замовити Sample Box та отримати умови партнерської програми!"},"ru":{"title":"Профессиональные возможности для дизайнеров и архитекторов","subtitle":"Сотрудничество, которое подчеркнет статус ваших проектов","body":"• Партнерские программы: Специальные условия закупки, персональное агентское вознаграждение или индивидуальные скидки для ваших клиентов.\n• Профессиональные материалы: Бесплатно отправляем премиальный Sample Box с образцами более 40 видов тканей и предоставляем бесшовные 3D-текстуры высокого разрешения.\n• Сопровождение «под ключ»: Персональный технолог возьмет на себя все заботы — от точных замеров кроватей до финальной глажки и заправки на объекте.\n\nОставьте ваш номер телефона, чтобы бесплатно заказать Sample Box и получить условия партнерской программы!"},"en":{"title":"Exclusive Opportunities for Designers & Architects","subtitle":"Partnership that Elevates the Status of Your Projects","body":"• Partnership Programs: Dedicated loyalty incentives, bespoke agent commissions, or client-exclusive pricing.\n• Design Support: Order our signature Fabric Sample Box with 40+ textile swatches and access high-res seamless 3D textures.\n• Turnkey Logistics: A dedicated specialist handles everything from professional measurements to on-site styling before project handover.\n\nLeave your phone number to receive your complimentary Fabric Sample Box and review our designer terms!"}}},{"id":"slide-7","number":7,"layout":"split","image":"https://shtayer.ua/image/catalog/postelnoe-bele/MUSHROOM/03.25place3184.jpg","imageAlt":"Meticulous bed-making using Shtayer Moss luxury sateen bedding collection","content":{"uk":{"title":"Ваш надійний партнер при комплектації","subtitle":"Знімаємо з вас турботи щодо текстильного оформлення об'єкта","body":"• Персональний технолог: Повний супровід вашого замовлення від замірів ліжок на об'єкті до фінального застеляння перед здачею.\n• Захист вашої репутації: Ви рекомендуєте продукт, який слугуватиме роками. Клієнт буде вдячний за комфорт щоночі.\n• Спеціальні умови: Гнучка програма лояльності або агентська винагорода для дизайнерів."},"ru":{"title":"Ваш надежный партнер при комплектации","subtitle":"Снимаем с вас заботы по текстильному оформлению объекта","body":"• Персональный технолог: Полное сопровождение вашего заказа от замеров кроватей на объекте до финальной заправки перед сдачей.\n• Защита репутации: Вы рекомендуете продукт, который прослужит годами. Клиент будет благодарен за комфорт каждую ночь.\n• Специальные условия: Гибкая программа лояльности или агентское вознаграждение для дизайнеров."},"en":{"title":"Your Reliable Partner in Procurement","subtitle":"Taking Off Your Shoulders the Entire Textile Specification Process","body":"• Personal Specialist: Complete support for your order from professional on-site bed measurements to final styling before project handover.\n• Brand Safety: You recommend a durable product that lasts for years. Your client will thank you for their nightly absolute comfort.\n• Designer Benefits: Highly favorable partnership programs, loyalty incentives, or custom commissions."}}},{"id":"slide-8","number":8,"layout":"detail","image":"https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?q=80&w=400&auto=format&fit=crop","imageAlt":"Minimalist layout with a designer brand logo, an elegant stationery set, and a QR code mockup","content":{"uk":{"title":"Створюймо бездоганні інтер'єри разом","subtitle":"Контактна інформація бренду Shtayer","body":"Зв'яжіться з нами для знайомства та вибору текстилю преміум-класу:\n\n• Електронна пошта: shtayer.forhotel@gmail.com\n• Номер телефону: +380 (95) 109 62 79\n\n"},"ru":{"title":"Создаем безупречные интерьеры вместе","subtitle":"Контакты бренда Shtayer","body":"Свяжитесь с нами для знакомства и выбора текстиля премиум-класса:\n\n• Электронная почта: shtaer@ukr.net\n• Номер телефону: +380 (95) 109 62 79\n• Instagram: @shtayer.ua\n• Мессенджеры (Viber, Telegram, WhatsApp): +380 (95) 109 62 79"},"en":{"title":"Let's Co-Create Impeccable Interiors","subtitle":"Shtayer Contact Details","body":"Contact us to connect and select premium textiles:\n\n• E-mail: shtaer@ukr.net\n• Phone number: +380 (95) 109 62 79\n• Instagram: @shtayer.ua\n• Messengers (Viber, Telegram, WhatsApp): +380 (95) 109 62 79"}}}];

    // Helper to get beautiful, concise label text for floating connections
    function getShortLabel(value, type) {
      if (!value) return "";
      var trimmed = value.trim();
      if (type === "instagram") {
        var username = trimmed.replace(/\/$/, "");
        if (username.indexOf("instagram.com/") !== -1) {
          username = username.split("instagram.com/")[1];
        }
        if (username.indexOf("?") !== -1) {
          username = username.split("?")[0];
        }
        return username.indexOf("@") === 0 ? username : "@" + username;
      }
      if (type === "telegram") {
        var username = trimmed.replace(/\/$/, "");
        if (username.indexOf("t.me/") !== -1) {
          username = username.split("t.me/")[1];
        }
        if (username.indexOf("tg://resolve?domain=") !== -1) {
          username = username.split("tg://resolve?domain=")[1];
        }
        return username.indexOf("@") === 0 ? username : "@" + username;
      }
      if (type === "website") {
        var domain = trimmed.replace(/^(https?:\/\/)?(www\.)?/, "");
        domain = domain.split("/")[0];
        return domain;
      }
      if (type === "whatsapp") {
        return "WhatsApp";
      }
      return trimmed;
    }

                <h2 class="text-[clamp(1.1rem,4.5vw,1.6rem)] md:text-2xl font-serif font-semibold tracking-tight mb-1.5 ${theme.textPrimaryClass}" ${textPrimaryColor}>${content.title}</h2>
                <p class="text-[clamp(0.65rem,2.2vw,0.8rem)] md:text-sm font-sans tracking-wide ${theme.accentColorClass} mb-2" ${accentStyle}>${content.subtitle}</p>
                <div class="w-12 h-[1px] ${theme.dividerClass} mb-3"></div>
                <div class="text-[clamp(0.65rem,2vw,0.8rem)] md:text-sm leading-relaxed ${theme.textSecondaryClass} whitespace-pre-line" ${textSecondaryColor}>${content.body}</div>
              </div>
              <div class="md:col-span-7 grid grid-cols-2 gap-2 p-3 bg-stone-950/20 order-1 md:order-2 h-64 md:h-auto shrink-0">
                <div class="relative overflow-hidden rounded-lg">
                  <img src="${slide.image}" referrerpolicy="no-referrer" class="w-full h-full object-cover">
                  <div class="absolute bottom-1.5 left-1.5 px-2 py-0.5 bg-black/60 rounded text-[8px] md:text-[10px] text-stone-200 uppercase font-sans tracking-widest font-semibold pointer-events-none">
                    ${currentLang === "uk" ? "Постіль" : currentLang === "ru" ? "Постель" : "Linens"}
                  </div>
                </div>
                <div class="relative overflow-hidden rounded-lg bg-stone-900">
                  <img src="https://shtayer.ua/image/catalog/podushki/firm/Capture%20One%20Catalog4151-min.jpg" referrerpolicy="no-referrer" class="w-full h-full object-cover">
                  <div class="absolute bottom-1.5 left-1.5 px-2 py-0.5 bg-black/60 rounded text-[8px] md:text-[10px] text-stone-200 uppercase font-sans tracking-widest font-semibold pointer-events-none">
                    ${currentLang === "uk" ? "Подушки" : currentLang === "ru" ? "Подушки" : "Pillows"}
                  </div>
                </div>
                <div class="relative overflow-hidden rounded-lg bg-stone-900">
                  <img src="https://shtayer.ua/image/catalog/home%20wear%20bamboo/robe%20sand/IMG_1143.jpg" referrerpolicy="no-referrer" class="w-full h-full object-cover">
                  <div class="absolute bottom-1.5 left-1.5 px-2 py-0.5 bg-black/60 rounded text-[8px] md:text-[10px] text-stone-200 uppercase font-sans tracking-widest font-semibold pointer-events-none">
                    ${currentLang === "uk" ? "Халати" : currentLang === "ru" ? "Халаты" : "Robes"}
                  </div>
                </div>
                <div class="relative overflow-hidden rounded-lg bg-stone-900">
                  <img src="https://shtayer.ua/image/catalog/odeyalo/CASHMERE/Capture%20One%20Catalog4352-min.jpg" referrerpolicy="no-referrer" class="w-full h-full object-cover">
                  <div class="absolute bottom-1.5 left-1.5 px-2 py-0.5 bg-black/60 rounded text-[8px] md:text-[10px] text-stone-200 uppercase font-sans tracking-widest font-semibold pointer-events-none">
                    ${currentLang === "uk" ? "Ковдри" : currentLang === "ru" ? "Одеяла" : "Duvets"}
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;
      }

            // Render floating contacts menu
      var socialHtml = "";
      if (socialLinks && (socialLinks.instagram || socialLinks.whatsapp || socialLinks.telegram || socialLinks.phone || socialLinks.website)) {
        socialHtml = '<div class="absolute bottom-16 right-4 sm:bottom-4 sm:right-4 z-40 flex items-center gap-2 pointer-events-auto">';
        if (socialLinks.instagram) {
          var instaUrl = socialLinks.instagram.indexOf("http") === 0 ? socialLinks.instagram : "https://instagram.com/" + socialLinks.instagram;
          socialHtml += '<a href="' + instaUrl + '" target="_blank" rel="noopener noreferrer" class="group flex items-center h-8 rounded-full bg-[#bd603f] hover:bg-[#a54c2d] text-white shadow-md hover:shadow-lg transition-all duration-300 ease-out overflow-hidden px-2.5 max-w-[34px] hover:max-w-[220px] w-8.5 hover:w-auto" title="Instagram">';
          socialHtml += '<svg class="w-4 h-4 text-white shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>';
          socialHtml += '<span class="text-[11px] font-bold text-white opacity-0 group-hover:opacity-100 transition-opacity duration-300 whitespace-nowrap overflow-hidden ml-0 group-hover:ml-2">' + getShortLabel(socialLinks.instagram, 'instagram') + '</span>';
          socialHtml += '</a>';
        }
        if (socialLinks.telegram) {
          var tgUrl = (socialLinks.telegram.indexOf("http") === 0 || socialLinks.telegram.indexOf("tg://") === 0) ? socialLinks.telegram : "https://t.me/" + socialLinks.telegram;
          socialHtml += '<a href="' + tgUrl + '" target="_blank" rel="noopener noreferrer" class="group flex items-center h-8 rounded-full bg-[#bd603f] hover:bg-[#a54c2d] text-white shadow-md hover:shadow-lg transition-all duration-300 ease-out overflow-hidden px-2.5 max-w-[34px] hover:max-w-[220px] w-8.5 hover:w-auto" title="Telegram">';
          socialHtml += '<svg class="w-4 h-4 text-white shrink-0" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 0 0-.05-.18c-.06-.05-.14-.03-.21-.02-.1.02-1.62 1.03-4.57 3.02-.43.3-.82.45-1.17.44-.39-.01-1.14-.22-1.7-.41-.69-.23-1.24-.35-1.19-.74.03-.2.3-.4.81-.59 3.19-1.39 5.32-2.3 6.39-2.73 3.04-1.23 3.67-1.44 4.09-1.45.09 0 .3.02.43.12.11.08.14.2.16.29.02.1.03.31.01.47z"></path></svg>';
          socialHtml += '<span class="text-[11px] font-bold text-white opacity-0 group-hover:opacity-100 transition-opacity duration-300 whitespace-nowrap overflow-hidden ml-0 group-hover:ml-2">' + getShortLabel(socialLinks.telegram, 'telegram') + '</span>';
          socialHtml += '</a>';
        }
        if (socialLinks.whatsapp) {
          var waPhoneClean = socialLinks.whatsapp.replace(/\D/g, "");
          var waUrl = (socialLinks.whatsapp.indexOf("http") === 0 || socialLinks.whatsapp.indexOf("whatsapp://") === 0) ? socialLinks.whatsapp : "https://wa.me/" + waPhoneClean;
          socialHtml += '<a href="' + waUrl + '" target="_blank" rel="noopener noreferrer" class="group flex items-center h-8 rounded-full bg-[#bd603f] hover:bg-[#a54c2d] text-white shadow-md hover:shadow-lg transition-all duration-300 ease-out overflow-hidden px-2.5 max-w-[34px] hover:max-w-[220px] w-8.5 hover:w-auto" title="WhatsApp">';
          socialHtml += '<svg class="w-4 h-4 text-white shrink-0" viewBox="0 0 24 24" fill="currentColor"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.514 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.502-5.724-1.457L0 24zm6.59-4.846c1.6.95 3.188 1.449 4.825 1.451 5.436 0 9.86-4.37 9.864-9.799.002-2.63-1.023-5.101-2.885-6.963C16.388 2.019 13.91 1.01 11.983 1.01c-5.441 0-9.866 4.372-9.87 9.802 0 1.734.45 3.424 1.302 4.922L2.392 21.01l5.421-1.411c-.34.22-.34.22-.34.22zm11.367-7.051c-.301-.15-1.781-.877-2.056-.977-.275-.1-.475-.15-.675.15-.199.3-.775.976-.95 1.176-.175.2-.35.225-.65.075-.301-.15-1.267-.467-2.414-1.49-.893-.797-1.495-1.782-1.67-2.081-.175-.3-.018-.462.13-.61.137-.133.3-.35.45-.525.15-.175.2-.3.3-.5.1-.2.05-.375-.025-.525-.075-.15-.675-1.625-.925-2.225-.244-.589-.493-.51-.675-.519-.174-.009-.374-.01-.574-.01-.2 0-.525.075-.8.375-.275.3-1.05 1.025-1.05 2.5s1.075 2.9 1.225 3.1c.15.2 2.113 3.227 5.118 4.525.715.31 1.273.496 1.71.635.717.228 1.37.196 1.885.119.574-.085 1.781-.727 2.031-1.428.25-.7.25-1.3.175-1.428-.075-.125-.275-.2-.575-.35z"></path></svg>';
          socialHtml += '<span class="text-[11px] font-bold text-white opacity-0 group-hover:opacity-100 transition-opacity duration-300 whitespace-nowrap overflow-hidden ml-0 group-hover:ml-2">' + getShortLabel(socialLinks.whatsapp, 'whatsapp') + '</span>';
          socialHtml += '</a>';
        }
        if (socialLinks.website) {
          var webUrl = socialLinks.website.indexOf("http") === 0 ? socialLinks.website : "https://" + socialLinks.website;
          socialHtml += '<a href="' + webUrl + '" target="_blank" rel="noopener noreferrer" class="group flex items-center h-8 rounded-full bg-[#bd603f] hover:bg-[#a54c2d] text-white shadow-md hover:shadow-lg transition-all duration-300 ease-out overflow-hidden px-2.5 max-w-[34px] hover:max-w-[220px] w-8.5 hover:w-auto" title="Website">';
          socialHtml += '<svg class="w-4 h-4 text-white shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>';
          socialHtml += '<span class="text-[11px] font-bold text-white opacity-0 group-hover:opacity-100 transition-opacity duration-300 whitespace-nowrap overflow-hidden ml-0 group-hover:ml-2">' + getShortLabel(socialLinks.website, 'website') + '</span>';
          socialHtml += '</a>';
        }
        if (socialLinks.phone) {
          socialHtml += '<a href="tel:' + socialLinks.phone + '" class="group flex items-center h-8 rounded-full bg-[#bd603f] hover:bg-[#a54c2d] text-white shadow-md hover:shadow-lg transition-all duration-300 ease-out overflow-hidden px-2.5 max-w-[34px] hover:max-w-[220px] w-8.5 hover:w-auto" title="Call Phone">';
          socialHtml += '<svg class="w-4 h-4 text-white shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>';
          socialHtml += '<span class="text-[11px] font-bold text-white opacity-0 group-hover:opacity-100 transition-opacity duration-300 whitespace-nowrap overflow-hidden ml-0 group-hover:ml-2">' + getShortLabel(socialLinks.phone, 'phone') + '</span>';
          socialHtml += '</a>';
        }
        socialHtml += '</div>';
      }
      
      slideHtml += socialHtml;

      stage.innerHTML = slideHtml;
      
      // Update page index layout
      const textLabels = uiLabels[currentLang] || uiLabels.en;
      let indText = textLabels.slideIndicator || "Slide {current} of {total}";
      indText = indText.replace("{current}", activeSlideIndex + 1).replace("{total}", slides.length);
      indexIndicator.textContent = indText;

      // Update Navigation controls disabled statuses
      prevBtn.disabled = activeSlideIndex === 0;
      nextBtn.disabled = activeSlideIndex === slides.length - 1;
      if (floatingPrevBtn) floatingPrevBtn.disabled = activeSlideIndex === 0;
      if (floatingNextBtn) floatingNextBtn.disabled = activeSlideIndex === slides.length - 1;

      // Render dot indicators
      if (dotsContainer) {
        let dotsHtml = '';
        for (let i = 0; i < slides.length; i++) {
          const isActive = i === activeSlideIndex;
          const activeClass = isActive ? 'bg-[#bd603f] scale-125 ring-2 ring-white/20' : 'bg-white/30 hover:bg-white/60';
          dotsHtml += '<button onclick="jumpToSlide(' + i + ')" class="w-2.5 h-2.5 rounded-full transition-all duration-300 cursor-pointer ' + activeClass + '" title="Slide ' + (i + 1) + '"></button>';
        }
        dotsContainer.innerHTML = dotsHtml;
      }
    }

    // Navigation triggers
    function prevSlide() {
      if (activeSlideIndex > 0) {
        activeSlideIndex--;
        renderSlide();
      }
    }

    // Navigation triggers
    function nextSlide() {
      if (activeSlideIndex < slides.length - 1) {
        activeSlideIndex++;
        renderSlide();
      }
    }

    prevBtn.addEventListener('click', prevSlide);
    nextBtn.addEventListener('click', nextSlide);
    if (floatingPrevBtn) floatingPrevBtn.addEventListener('click', prevSlide);
    if (floatingNextBtn) floatingNextBtn.addEventListener('click', nextSlide);

    // Global jump action for clickable dots indicators
    window.jumpToSlide = function(index) {
      if (index >= 0 && index < slides.length) {
        activeSlideIndex = index;
        renderSlide();
      }
    };

    // Mobile Swipe gesture triggers
    let touchStartX = 0;
    let touchEndX = 0;
    const swipeThreshold = 50;

    document.addEventListener('touchstart', function(e) {
      touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });

    document.addEventListener('touchend', function(e) {
      touchEndX = e.changedTouches[0].screenX;
      const diffX = touchEndX - touchStartX;
      if (Math.abs(diffX) > swipeThreshold) {
        if (diffX > 0) {
          prevSlide();
        } else {
          nextSlide();
        }
      }
    }, { passive: true });

    // Physical Keyboard arrows triggers
    document.addEventListener('keydown', function(e) {
      if (document.activeElement && (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'SELECT')) {
        return; // Allow typing in input boxes
      }
      if (e.key === 'ArrowLeft') {
        prevSlide();
      } else if (e.key === 'ArrowRight') {
        nextSlide();
      }
    });

    // Language change triggers
    langSelect.addEventListener('change', function(e) {
      currentLang = e.target.value;
      applyLabels();
      renderSlide();
    });

    // Initial load setup
    applyGlobalTheme();
    renderLogo();
    applyLabels();
    renderSlide();
  </script>
</body>
</html>
